events {
    worker_connections 1024;
}

http {
    upstream openig_pool {
        # Cookie-based sticky: route by JSESSIONID for session affinity HA
        hash $cookie_JSESSIONID consistent;

        server openig-1:8080;
        server openig-2:8080;
    }

    # Increase buffer sizes for large OIDC cookies / JWT payloads
    proxy_buffer_size       128k;
    proxy_buffers           4 256k;
    proxy_busy_buffers_size 256k;

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass         http://openig_pool;
            proxy_http_version 1.1;

            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Port  $server_port;

            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }
    }
}
