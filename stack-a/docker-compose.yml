# ============================================================
# SSO Lab: OpenIG (HA) + Keycloak + WordPress + MySQL
# Browser  → Nginx (port 80) → openig-1 / openig-2
#                                     ↓
#                              WordPress (internal)
#                                     ↑
#                              Keycloak (port 8080, browser + internal)
# ============================================================

networks:
  # Browser-facing: Nginx, Keycloak
  frontend:
    driver: bridge
  # Internal only: OpenIG ↔ WordPress ↔ Keycloak ↔ MySQL
  backend:
    driver: bridge

volumes:
  mysql_data:
  wordpress_data:
  redis_a_data:

services:

  # ----------------------------------------------------------
  # Load Balancer — Nginx
  # Distributes traffic across openig-1 and openig-2
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: sso-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend
      - backend
    depends_on:
      - openig-1
      - openig-2
    restart: unless-stopped

  # ----------------------------------------------------------
  # OpenIG node 1
  # JwtSession sharedSecret must be identical on both nodes
  # so any node can decrypt the session cookie from the other
  # ----------------------------------------------------------
  openig-1:
    image: openidentityplatform/openig
    platform: linux/amd64
    container_name: sso-openig-1
    user: root   # lab only — needed for write access to mounted volume on macOS
    # NOT exposed to host — accessed only through Nginx
    entrypoint: ["/docker-entrypoint.sh"]
    volumes:
      - ./openig_home:/opt/openig
      - ./docker/openig/server.xml:/usr/local/tomcat/conf/server.xml:ro
      - ./docker/openig/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ./vault/file:/vault/file:ro
    environment:
      OPENIG_BASE: /opt/openig
      JWT_SHARED_SECRET: "zK7izY2ZLyxsCm1AVJlcdXsZgwo7Y1LvyYTM6KcR+3Q="
      KEYSTORE_PASSWORD: "oT38gAgX25lFDkv9J4u+kPXtOFpddCTl"
      OIDC_CLIENT_SECRET: "openig-client-secret"
      KEYCLOAK_INTERNAL_URL: "http://host.docker.internal:8080"
      KEYCLOAK_BROWSER_URL: "http://auth.sso.local:8080"
      REDIS_HOST: "redis-a"
      OPENIG_PUBLIC_URL: "http://openiga.sso.local:80"
      OPENIG_NODE_NAME: "openig-1"
      VAULT_ADDR: "http://vault:8200"
      VAULT_ROLE_ID_FILE: "/vault/file/openig-role-id"
      VAULT_SECRET_ID_FILE: "/vault/file/openig-secret-id"
    networks:
      - backend
    restart: unless-stopped

  # ----------------------------------------------------------
  # OpenIG node 2 — identical config to node 1
  # ----------------------------------------------------------
  openig-2:
    image: openidentityplatform/openig
    platform: linux/amd64
    container_name: sso-openig-2
    user: root   # lab only
    entrypoint: ["/docker-entrypoint.sh"]
    volumes:
      - ./openig_home:/opt/openig
      - ./docker/openig/server.xml:/usr/local/tomcat/conf/server.xml:ro
      - ./docker/openig/docker-entrypoint.sh:/docker-entrypoint.sh:ro
      - ./vault/file:/vault/file:ro
    environment:
      OPENIG_BASE: /opt/openig
      JWT_SHARED_SECRET: "zK7izY2ZLyxsCm1AVJlcdXsZgwo7Y1LvyYTM6KcR+3Q="
      KEYSTORE_PASSWORD: "oT38gAgX25lFDkv9J4u+kPXtOFpddCTl"
      OIDC_CLIENT_SECRET: "openig-client-secret"
      KEYCLOAK_INTERNAL_URL: "http://host.docker.internal:8080"
      KEYCLOAK_BROWSER_URL: "http://auth.sso.local:8080"
      REDIS_HOST: "redis-a"
      OPENIG_PUBLIC_URL: "http://openiga.sso.local:80"
      OPENIG_NODE_NAME: "openig-2"
      VAULT_ADDR: "http://vault:8200"
      VAULT_ROLE_ID_FILE: "/vault/file/openig-role-id"
      VAULT_SECRET_ID_FILE: "/vault/file/openig-secret-id"
    networks:
      - backend
    restart: unless-stopped

  # ----------------------------------------------------------
  # WordPress — Legacy App (simulated)
  # NOT exposed to host — browser must go through OpenIG
  # OpenIG injects WP credentials on behalf of user
  # ----------------------------------------------------------
  wordpress:
    image: wordpress:6-apache
    container_name: sso-wordpress
    # port 80 only on backend network — not exposed
    environment:
      WORDPRESS_DB_HOST: mysql:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress_pass
      # Pre-set admin credentials to match credentials store
      WORDPRESS_TABLE_PREFIX: wp_
    entrypoint: ["bash", "-c", "a2enmod alias && exec docker-entrypoint.sh apache2-foreground"]
    volumes:
      - wordpress_data:/var/www/html
      - ./docker/wordpress/app1.conf:/etc/apache2/conf-enabled/app1.conf:ro
    networks:
      - backend
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # ----------------------------------------------------------
  # WhoAmI — simple header echo app for demo App2
  # ----------------------------------------------------------
  whoami:
    image: traefik/whoami:latest
    container_name: sso-whoami
    networks:
      - backend
    restart: unless-stopped

  redis-a:
    image: redis:7-alpine
    container_name: sso-redis-a
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redis_a_data:/data
    networks:
      - backend
    restart: unless-stopped

  vault:
    image: hashicorp/vault:1.15
    container_name: sso-vault
    cap_add: [IPC_LOCK]
    command: server
    volumes:
      - ./vault/config:/vault/config:ro
      - ./vault/data:/vault/data
      - ./vault/file:/vault/file
      - ./vault/keys:/vault/keys
    networks:
      - backend
    restart: unless-stopped

  # ----------------------------------------------------------
  # MySQL — DB for WordPress
  # ----------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: sso-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_pass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
