events {
    worker_connections 1024;
}

http {
    upstream openig_pool {
        # Session affinity: ip_hash ensures same client routes to same node
        ip_hash;

        # Health check baseline (passive):
        #   max_fails=3    — mark node down after 3 consecutive failures
        #   fail_timeout=10s — probe window + duration node stays marked down
        # Map to F5: rise=2 fall=3 interval=5s timeout=10s
        server openig-1:8080 max_fails=3 fail_timeout=10s;
        server openig-2:8080 max_fails=3 fail_timeout=10s;
    }

    # Increase buffer sizes for large OIDC cookies / JWT payloads
    proxy_buffer_size       128k;
    proxy_buffers           4 256k;
    proxy_busy_buffers_size 256k;

    server {
        listen 80;
        server_name whoami-a.sso.local;

        location /openig {
            return 403;
        }

        location / {
            proxy_pass http://openig_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Authenticated-User "";
            proxy_set_header X-WEBAUTH-USER "";
            proxy_connect_timeout 3s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }
    }

    server {
        listen 80;
        server_name wp-a.sso.local;

        location = /openid/app1/backchannel_logout {
            proxy_pass http://openig_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 3s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_request_buffering off;
            proxy_next_upstream off;
        }

        location /openig {
            return 403;
        }

        location / {
            proxy_pass http://openig_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Authenticated-User "";
            proxy_set_header X-WEBAUTH-USER "";
            proxy_connect_timeout 3s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }
    }

    server {
        listen 80;
        server_name openiga.sso.local;

        # Redirect bare /wp-admin/ (no /app1/ prefix) → /app1/wp-admin/
        location = /wp-admin/ {
            return 302 /app1/wp-admin/;
        }

        location /openig {
            return 403;
        }

        location / {
            proxy_pass http://openig_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Authenticated-User "";
            proxy_set_header X-WEBAUTH-USER "";
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 3s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }
    }
}
