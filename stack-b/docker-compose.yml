# ============================================================
# Stack B: OpenIG HA + .NET App + Vault-B
# Browser → nginx-b (port 9080) → openig-b1/b2 → dotnet-app
# Shares Keycloak at http://host.docker.internal:8080
# ============================================================

networks:
  frontend-b:
    driver: bridge
  backend-b:
    driver: bridge

volumes:
  redmine_mysql_data:
  redmine_data:

services:

  nginx-b:
    image: nginx:1.25-alpine
    container_name: sso-b-nginx
    ports:
      - "9080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend-b
      - backend-b
    depends_on:
      - openig-b1
      - openig-b2
    restart: unless-stopped

  openig-b1:
    image: openidentityplatform/openig
    platform: linux/amd64
    container_name: sso-b-openig-1
    user: root
    volumes:
      - ./openig_home:/opt/openig
      - ./vault/file:/vault/file:ro
      - ./docker/openig/server.xml:/usr/local/tomcat/conf/server.xml:ro
    environment:
      OPENIG_BASE: /opt/openig
      REDIS_HOST: redis-b
      OPENIG_PUBLIC_URL: 'http://openigb.sso.local:9080'
      JWT_SHARED_SECRET: "U1NPLUItSnd0U2VjcmV0LTMyYnl0ZXMtS0VZX1whQCMk"
      KEYCLOAK_BROWSER_URL: "http://auth.sso.local:8080"
      KEYCLOAK_INTERNAL_URL: "http://host.docker.internal:8080"
      DOTNET_APP_BASE_URL: "http://dotnet-app:5000/app3"
      OIDC_CLIENT_ID: "openig-client-b"
      APP_PUBLIC_BASE_URL: "http://openigb.sso.local:9080/app3"
      OPENIG_NODE_NAME: "openig-b1"
      VAULT_ADDR: "http://vault-b:8200"
      VAULT_ROLE_ID_FILE: "/vault/file/openig-role-id"
      VAULT_SECRET_ID_FILE: "/vault/file/openig-secret-id"
    networks:
      - backend-b
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/openig/api/info"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  openig-b2:
    image: openidentityplatform/openig
    platform: linux/amd64
    container_name: sso-b-openig-2
    user: root
    volumes:
      - ./openig_home:/opt/openig
      - ./vault/file:/vault/file:ro
      - ./docker/openig/server.xml:/usr/local/tomcat/conf/server.xml:ro
    environment:
      OPENIG_BASE: /opt/openig
      REDIS_HOST: redis-b
      OPENIG_PUBLIC_URL: 'http://openigb.sso.local:9080'
      JWT_SHARED_SECRET: "U1NPLUItSnd0U2VjcmV0LTMyYnl0ZXMtS0VZX1whQCMk"
      KEYCLOAK_BROWSER_URL: "http://auth.sso.local:8080"
      KEYCLOAK_INTERNAL_URL: "http://host.docker.internal:8080"
      DOTNET_APP_BASE_URL: "http://dotnet-app:5000/app3"
      OIDC_CLIENT_ID: "openig-client-b"
      APP_PUBLIC_BASE_URL: "http://openigb.sso.local:9080/app3"
      OPENIG_NODE_NAME: "openig-b2"
      VAULT_ADDR: "http://vault-b:8200"
      VAULT_ROLE_ID_FILE: "/vault/file/openig-role-id"
      VAULT_SECRET_ID_FILE: "/vault/file/openig-secret-id"
    networks:
      - backend-b
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/openig/api/info"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  dotnet-app:
    build:
      context: ./dotnet-app
      dockerfile: Dockerfile
    container_name: sso-b-dotnet
    networks:
      - backend-b
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/5000' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis-b:
    image: redis:7-alpine
    container_name: sso-redis-b
    networks:
      - backend-b
    restart: unless-stopped

  mysql-redmine:
    image: mysql:8.0
    container_name: sso-b-mysql-redmine
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: redmine
      MYSQL_USER: redmine
      MYSQL_PASSWORD: redmine_pass
    volumes:
      - redmine_mysql_data:/var/lib/mysql
    networks:
      - backend-b
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redmine:
    build:
      context: ./docker/redmine
      dockerfile: Dockerfile
    image: redmine:5.1-app4
    container_name: sso-b-redmine
    ports:
      - "3000:3000"
    environment:
      REDMINE_DB_MYSQL: mysql-redmine
      REDMINE_DB_DATABASE: redmine
      REDMINE_DB_USERNAME: redmine
      REDMINE_DB_PASSWORD: redmine_pass
      REDMINE_SECRET_KEY_BASE: redmine_secret_key_lab_2026
      REDMINE_RELATIVE_URL_ROOT: /app4
      RAILS_RELATIVE_URL_ROOT: /app4
    depends_on:
      mysql-redmine:
        condition: service_healthy
    volumes:
      - redmine_data:/usr/src/redmine/files
    networks:
      - backend-b

  vault-b:
    image: hashicorp/vault:1.15
    container_name: sso-b-vault
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: vault-root-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: server -dev
    volumes:
      - ./vault/file:/vault/file
    networks:
      - backend-b
    restart: unless-stopped
