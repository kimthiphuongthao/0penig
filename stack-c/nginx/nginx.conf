events {
    worker_connections 1024;
}

http {
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;

    upstream openig_c_pool {
        ip_hash;
        server openig-c1:8080 max_fails=3 fail_timeout=30s;
        server openig-c2:8080 max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # --- Security Headers (lab-safe over HTTP; add HSTS when TLS enabled) ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # HSTS: uncomment when TLS is enabled
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    server {
        listen 80;
        server_name grafana-c.sso.local;

        location = /openid/app5/backchannel_logout {
            proxy_pass http://openig_c_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 3s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_request_buffering off;
            proxy_next_upstream off;
        }

        # Block OpenIG admin endpoints from external access
        location /openig {
            return 403;
        }

        location / {
            proxy_pass http://openig_c_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Authenticated-User "";
            proxy_set_header X-WEBAUTH-USER "";
            proxy_connect_timeout 3s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }
    }

    server {
        listen 80;
        server_name phpmyadmin-c.sso.local;

        location = /openid/app6/backchannel_logout {
            proxy_pass http://openig_c_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 3s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_request_buffering off;
            proxy_next_upstream off;
        }

        # Block OpenIG admin endpoints from external access
        location /openig {
            return 403;
        }

        location / {
            proxy_pass http://openig_c_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Authenticated-User "";
            proxy_set_header X-WEBAUTH-USER "";
            proxy_set_header Authorization "";
            proxy_connect_timeout 3s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_next_upstream error timeout http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
        }
    }
}
